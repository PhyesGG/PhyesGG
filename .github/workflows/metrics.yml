# Genere assets/metrics.svg dans le repo — plus aucune dependance a un service externe.
# Setup (2 min) :
#  1. github.com/settings/tokens -> "Generate new token (classic)" -> cocher public_repo + read:user
#  2. Repo PhyesGG/PhyesGG -> Settings -> Secrets and variables -> Actions -> New secret
#     Nom: METRICS_TOKEN, valeur: le token
#  3. Commit ce fichier dans .github/workflows/ puis onglet Actions -> metrics -> Run workflow
name: metrics
on:
  schedule: [{cron: "0 6 * * *"}]
  workflow_dispatch:
  push: {branches: [main]}
permissions:
  contents: write
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PhyesGG
          template: classic
          filename: assets/metrics.svg
          committer_branch: main
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: Europe/Paris
